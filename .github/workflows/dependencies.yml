name: Check Dependencies
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
jobs:  
  checks:  
    runs-on: ubuntu-latest  
    steps:  
      - uses: actions/checkout@v6  
      - name: Deny check  
        run: |  
          cargo install cargo-deny  
          cargo deny check
